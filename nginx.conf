server {
    listen 80;

    # Serve React SPA — fall back to index.html for client-side routing
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy all /api/* and /admin/* and /accounts/* and /static/* requests to Django
    location ~ ^/(api|admin|accounts|api-token-auth|static)/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 50M;
    }

    # Serve Django media files
    location /media/ {
        proxy_pass http://backend:8000/media/;
    }
}
